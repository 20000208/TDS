<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS | TeamDevStudio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: gradientMove 15s ease infinite;
    color: white;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 네비게이션 */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    z-index: 1000;
}

nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    cursor: pointer;
}

/* 히어로 */
header {
    text-align: center;
    padding: 150px 20px 80px;
}

header h1 {
    font-size: 60px;
}

header button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

/* 섹션 */
section {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
}

/* 카드 */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 25px;
}

/* 멤버 */
.members {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 20px;
}

.member {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

.member:hover {
    transform: scale(1.05);
}

/* 모달 업그레이드 */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);

    justify-content: center;
    align-items: center;

    opacity: 0;
    transition: opacity 0.3s ease;
}

.modal.show {
    display: flex;
    opacity: 1;
}

.modal-content {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    width: 320px;

    box-shadow: 0 20px 50px rgba(0,0,0,0.5);

    transform: scale(0.8);
    opacity: 0;
    transition: all 0.3s ease;
}

.modal.show .modal-content {
    transform: scale(1);
    opacity: 1;
}

/* 버튼 */
.modal-content button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;

    background: linear-gradient(135deg, #203a43, #2c5364);
    color: white;

    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.modal-content button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #2c5364, #0f2027);
}

/* 닫기 */
.close {
    margin-top: 15px;
    cursor: pointer;
    color: #ccc;
}

.close:hover {
    color: white;
}

/* 푸터 */
footer {
    text-align: center;
    padding: 40px;
    opacity: 0.6;
}
</style>
</head>

<body>

<nav>
    <div>TDS</div>
    <div>
        <a onclick="scrollSection('intro')">소개</a>
        <a onclick="scrollSection('activity')">활동</a>
        <a onclick="scrollSection('members')">멤버</a>
    </div>
</nav>

<header>
    <h1>TDS</h1>
    <p>TeamDevStudio</p>
    <button onclick="scrollSection('intro')">더 알아보기</button>
</header>

<section id="intro">
    <div class="card">
        <h2>소개</h2>
        <p>“TDS(TeamDevStudiO)는 SOOP에서 방송과 크루 기반 활동과 간단한 매니지먼트 기능을 결합한 비기업 조직입니다.”</p>
    </div>
</section>

<section id="activity">
    <div class="card">
        <h2>활동</h2>
        <p>
            - SOOP 방송 진행<br>
            - 유튜브 영상 제작<br>
            - 콘텐츠 제작
        </p>
    </div>
</section>

<section id="members">
    <div class="card">
        <h2>멤버</h2>
        <div class="members">
            <div class="member" onclick="openProfile('은율')">은율</div>
            <div class="member" onclick="openProfile('단늅')">단늅</div>
            <div class="member" onclick="openProfile('선몬')">선몬</div>
            <div class="member" onclick="openProfile('나인')">나인</div>
            <div class="member" onclick="openProfile('맥주')">맥주</div>
            <div class="member" onclick="openProfile('상추')">상추</div>
            <div class="member" onclick="openProfile('카인')">카인</div>
            <div class="member" onclick="openProfile('용훈')">용훈</div>
        </div>
    </div>
</section>

<footer>
    © 2026 TDS (TeamDevStudio)
</footer>

<!-- 모달 -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <h2 id="profileName"></h2>
        <p id="profileDesc"></p>

        <div>
            <button id="youtubeBtn" onclick="openLink('youtube')">유튜브</button>
            <button id="soopBtn" onclick="openLink('soop')">방송</button>
        </div>

        <div class="close" onclick="closeModal()">닫기</div>
    </div>
</div>

<script>
let currentLinks = {};

/* 스크롤 */
function scrollSection(id) {
    const el = document.getElementById(id);
    if (el) {
        el.scrollIntoView({ behavior: "smooth" });
    }
}

/* 프로필 */
function openProfile(name) {
    const data = {
        "은율": {
            desc: "보통 전체 인간들을 관리 합니다.",
            youtube: "https://www.youtube.com/@%ED%86%A0%EA%B2%9C",
            soop: "https://www.sooplive.com/station/xhrpa1234"
        },
        "단늅": { desc: "출연만 하고 있습니다.", youtube: "https://www.youtube.com/@%EB%8B%A8%EB%8A%8512", soop: "https://www.sooplive.com/station/ekssbq12" },
        "선몬": { desc: "출연만 하고 있습니다.", youtube: "https://www.youtube.com/@%EC%84%A0%EB%AA%AC", soop: "https://www.sooplive.com/station/tjsahs" },
        "나인": { desc: "출연만 하고 있습니다.", youtube: "https://www.youtube.com/@%EB%9D%BC%EB%96%BC-g3j", soop: "https://xn--299aj6jhwd9vss3a/" },
        "맥주": { desc: "출연만 하고 있습니다.", youtube: "https://www.youtube.com/@AhsayGihap", soop: "https://xn--299aj6jhwd9vss3a/" },
        "상추": { desc: "출연만 하고 있습니다.", youtube: "https://xn--299aj6jhwd9vss3a/", soop: "https://xn--299aj6jhwd9vss3a/" },
        "카인": { desc: "출연만 하고 있습니다.", youtube: "https://xn--299aj6jhwd9vss3a/", soop: "https://xn--299aj6jhwd9vss3a/" },
        "호승": { desc: "출연만 하고 있습니다.", youtube: "https://xn--299aj6jhwd9vss3a/", soop: "https://xn--299aj6jhwd9vss3a/" },
        "용훈": { desc: "출연만 하고 있습니다.", youtube: "https://xn--299aj6jhwd9vss3a/", soop: "https://xn--299aj6jhwd9vss3a/" }
    };

    const member = data[name];

    document.getElementById("profileName").innerText = name;
    document.getElementById("profileDesc").innerText = member.desc;

    currentLinks = member;

    document.getElementById("youtubeBtn").style.display = member.youtube ? "inline-block" : "none";
    document.getElementById("soopBtn").style.display = member.soop ? "inline-block" : "none";

    const modal = document.getElementById("profileModal");
    modal.style.display = "flex";

    setTimeout(() => {
        modal.classList.add("show");
    }, 10);
}

/* 링크 */
function openLink(type) {
    const url = currentLinks[type];
    if (url) {
        window.open(url, "_blank");
    }
}

/* 닫기 */
function closeModal() {
    const modal = document.getElementById("profileModal");

    modal.classList.remove("show");

    setTimeout(() => {
        modal.style.display = "none";
    }, 300);
}

/* 배경 클릭 닫기 */
document.getElementById("profileModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeModal();
    }
});
</script>

</body>
</html>
